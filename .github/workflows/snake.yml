name: Generate contribution snake

on:
  schedule:
    - cron: "0 15 * * *"   # daily, 15:00 UTC
  workflow_dispatch:        # manual run, so you can seed the output branch immediately
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        id: snake
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?palette=github-dark&color_snake=#0D9488&color_dots=#161B22,#1E3A8A,#2563EB,#0D9488,#5EEAD4

      - name: Push to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
